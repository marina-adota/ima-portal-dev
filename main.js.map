<!--Card do formulario-->
<div class="card p-3 col-8 mx-auto mt-5">
  <div class="card-body col-12">
    <h3>Registro de Animal</h3>

    <!--formulario-->
    <form action="#" class="row">

      <div class="d-flex justify-content-between col-12">

        <div class="form-group">
          <label for="formGroupExampleInput"><strong>Nome</strong></label>
          <input type="text" class="form-control" id="name" placeholder="Digite o nome do animal">
        </div>

        <div class="form-group">
          <label for="formGroupExampleInput"><strong>Idade</strong></label>
          <input type="text" class="form-control" id="age" placeholder="Digite a idade">
        </div>

        <div class="form-group">
          <label for="formGroupExampleInput"><strong>Raça</strong></label>
          <input type="text" class="form-control" id="breed" placeholder="Digite a raça do animal">
        </div>
      </div>

      <div class="d-flex justify-content-between col-12  my-3">
        <div class="form-group">
          <label for="disabledSelect"><strong>Porte</strong></label>
          <select id="disabledSelect" class="form-control">
            <option disabled selected>Selecionar porte </option>
            <option>Pequeno</option>
            <option>Médio</option>
            <option>Grande</option>
          </select>
        </div>

        <div class="gender-inputs">
          <div class="gender-title">
            <h5><strong>Saúde</strong></h5>
          </div>
          <div class="gender-group">
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
              <label class="form-check-label" for="inlineCheckbox1"><strong>Vacinas</strong></label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
              <label class="form-check-label" for="inlineCheckbox2"><strong>Vermífugos</strong></label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
              <label class="form-check-label" for="inlineCheckbox3"><strong>Desparasitação</strong></label>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <label for="description"><strong>Descrição:</strong></label><br>
        <textarea name="description" id="description" cols="70" placeholder="Digite uma descrição do animal"
          rows="4"></textarea>
      </div>

      <div class="d-flex my-3">
        <div class="form-group">
          <label for="exampleFormControlFile1"><strong>Fotos(Limite de 5, apenas jpg)</strong></label>
          <input type="file" class="form-control-file" id="exampleFormControlFile1" accept=".jpg">
        </div>

        <div class="ms-auto form-check form-check-inline">
          <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
          <label class="form-check-label" for="inlineCheckbox3"><strong>Disponível</strong></label>
        </div>
      </div>

      <div class="">
        <button type="button" class="btn btn-primary mt-4">REGISTRAR</button>
      </div>
    </form>
  </div>
</div>

<!-- Search -->
<div class="input rounded col-8 mx-auto my-5">

  <!-- Bar -->
  <div class="input-group border rounded">

    <div class="form-outline">
      <input type="search" id="form1" class="form-control" [(ngModel)]="searchInput" (input)="searchNames()" (keyup.enter)="searchAnimals(searchInput)"/>
      <label class="form-label" for="form1"><strong>Pesquisar por nome</strong></label>
    </div>

    <span class="input-text border-0 my-auto me-2 pointer" id="search-addon" (click)="searchAnimals(searchInput)">
      <i class="fas fa-search"></i>
    </span>

  </div>

  <!-- Drop list name -->
  <div *ngIf="animalNames.length > 0">
    <ul class="list-group border rounded">
      <li class="list-group-item list-group-item-action user-select-none pointer" *ngFor="let name of animalNames" (click)="searchAnimals(name)">
        {{ name }}
      </li>
    </ul>
  </div>

</div>

<!-- Animals -->

        <h5 class="mx-auto card-title">AMORA</h5>
        <p class="card-text">1 ano e 6 meses.</p>
